name: CI

on:
    push:
        branches: [ master ]
    pull_request:
        branches: [ master ]

jobs:
    build-and-test:
        name: Build & Test (${{ matrix.preset }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false # Если упадет debug, asan все равно продолжит собираться
            matrix:
                preset: [ dev-clang-debug, dev-clang-asan ]

        steps:
            - uses: actions/checkout@v4

            - name: Install dependencies
              run: |
                sudo apt-get update
                sudo apt-get install -y ninja-build clang cmake

            - name: Configure
              run: cmake --preset ${{ matrix.preset }}

            - name: Build
              run: cmake --build --preset ${{ matrix.preset }}

            - name: Test
              run: ctest --preset ${{ matrix.preset }} --output-on-failure

            - name: Upload Test Logs on Failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                name: ctest-log-${{ matrix.preset }}
                path: build/${{ matrix.preset }}/Testing/Temporary/LastTest.log
                retention-days: 5

    formatting:
        name: Check Formatting
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Install clang-format
              run: |
                sudo apt-get update
                sudo apt-get install -y clang-format-19

            - name: Check formatting
              run: |
                  find include src tests -type f \( -name '*.hpp' -o -name '*.cpp' \) -print0 | \
                  xargs -0 clang-format-19 --dry-run --Werror
